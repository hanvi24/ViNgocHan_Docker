name: CI/CD Deploy to Docker Hub

on:
  push:
    branches: [ "main" ]  # Tự động chạy khi bạn đẩy code lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Bước 1 - Tải code từ GitHub về máy ảo
        uses: actions/checkout@v4

      - name: Bước 2 - Đăng nhập vào Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Bước 3 - Build và Push Image lên Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Bạn thay 'vingochan' bằng tên thật và 'spring-app' bằng tên dự án bạn muốn
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ngochan-0882-spring-docker:latest
            ${{ secrets.DOCKER_USERNAME }}/ngochan-0882-spring-docker:${{ github.sha }}
