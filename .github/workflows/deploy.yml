name: CI/CD Deploy to Docker Hub

on:
  push:
    branches: [ "main" ]  # Tự động chạy khi Hân push code lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Bước 1 - Tải code từ GitHub về máy ảo
        uses: actions/checkout@v4

      - name: Bước 2 - Thiết lập Java 21 và Maven
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Bước 3 - Build dự án (Tạo file .jar)
        # Lệnh này tạo ra thư mục /target mà Docker đang tìm kiếm
        run: mvn clean package -DskipTests 

      - name: Bước 4 - Đăng nhập vào Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Bước 5 - Build và Push Image lên Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tự động lấy tên từ Secrets để tránh lỗi gõ sai tên
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ngochan-0882-spring-docker:latest
            ${{ secrets.DOCKER_USERNAME }}/ngochan-0882-spring-docker:${{ github.sha }}
