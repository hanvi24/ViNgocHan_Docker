name: CI/CD Deploy to Docker Hub

on:
  push:
    branches: [ "main" ]  # Tự động chạy khi Hân push code lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Bước 1 - Tải code từ GitHub về máy ảo
        uses: actions/checkout@v4

      - name: Bước 2 - Thiết lập Java 21 và Maven
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Bước 3 - Build dự án (Tạo file .jar)
        # Lệnh này tạo ra thư mục /target mà Docker đang tìm kiếm
        run: mvn clean package -DskipTests 

      - name: Bước 4 - Đăng nhập vào Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Bước 5 - Build và Push Image lên Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tự động lấy tên từ Secrets để tránh lỗi gõ sai tên
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ngochan-0882-spring-docker:latest
            ${{ secrets.DOCKER_USERNAME }}/ngochan-0882-spring-docker:${{ github.sha }}
      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="repository/docker"
          CONTAINER_PORT=80
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=6&container_port=$CONTAINER_PORT&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed "$d")
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
